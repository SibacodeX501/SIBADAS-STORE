<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Das Shopping-mall | Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card:hover { transform: scale(1.03); transition: 0.3s; }
        .amazon-gradient { background: linear-gradient(to bottom, #232f3e, #131921); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); }
    </style>
</head>
<body class="bg-gray-200">

<nav class="amazon-gradient text-white p-3 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-4">
        <h1 class="text-2xl font-bold text-orange-400">Das <span class="text-white">Shopping-mall</span></h1>
        <div class="hidden md:flex flex-1 mx-10">
            <input type="text" placeholder="Search for PSD, CDR, Overlays..." class="w-full p-2 rounded-l text-black outline-none">
            <button class="bg-orange-400 px-5 rounded-r text-black"><i class="fa fa-search"></i></button>
        </div>
        <div class="flex space-x-6 items-center">
            <div class="hidden md:block">Hello, Siba<br><b>Karanjia Store</b></div>
            <div class="font-bold cursor-pointer"><i class="fa fa-shopping-cart text-xl"></i> Cart</div>
        </div>
    </div>
</nav>

<div class="bg-[#232f3e] text-white text-sm py-2 px-6 flex space-x-6 border-t border-gray-600">
    <a href="#" class="hover:text-orange-400"><i class="fa fa-bars"></i> All Categories</a>
    <a href="#" class="hover:text-orange-400">Best Sellers</a>
    <a href="#" class="hover:text-orange-400">Wedding PSD</a>
    <a href="#" class="hover:text-orange-400">Festival CDR</a>
    <a href="#" class="hover:text-orange-400">New Arrivals</a>
</div>

<div class="max-w-7xl mx-auto p-6">
    <h2 class="text-xl font-bold mb-6">Premium Graphics Collection</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

        <div class="bg-white p-4 rounded shadow-sm product-card cursor-pointer" onclick="openModal('Studio Pack PSD', '₹499', 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=500', 'Best for photo studio. High resolution 300 DPI files.')">
            <img src="https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=300" class="w-full h-48 object-cover mb-2 rounded">
            <h4 class="font-semibold text-sm text-gray-700">Studio Wedding PSD Background Pack</h4>
            <div class="text-yellow-500 text-xs my-1"><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i></div>
            <p class="text-lg font-bold text-red-700">₹499 <span class="text-xs text-gray-400 line-through">₹999</span></p>
            <button class="w-full bg-yellow-400 hover:bg-yellow-500 mt-3 py-1.5 rounded font-medium text-sm">View Details</button>
        </div>

        <div class="bg-white p-4 rounded shadow-sm product-card cursor-pointer" onclick="openModal('Ganesh Puja CDR', '₹149', 'https://images.unsplash.com/photo-1563297007-0686b7003af7?w=500', 'Editable CorelDraw file for Banner Printing.')">
            <img src="https://images.unsplash.com/photo-1563297007-0686b7003af7?w=300" class="w-full h-48 object-cover mb-2 rounded">
            <h4 class="font-semibold text-sm text-gray-700">Premium Ganesh Puja Banner CDR</h4>
            <div class="text-yellow-500 text-xs my-1"><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i></div>
            <p class="text-lg font-bold text-red-700">₹149 <span class="text-xs text-gray-400 line-through">₹300</span></p>
            <button class="w-full bg-yellow-400 hover:bg-yellow-500 mt-3 py-1.5 rounded font-medium text-sm">View Details</button>
        </div>

        </div>
</div>

<div id="pModal" class="modal flex items-center justify-center p-4">
    <div class="bg-white w-full max-w-4xl flex flex-col md:flex-row rounded-xl overflow-hidden relative">
        <span onclick="closeModal()" class="absolute top-3 right-5 text-3xl cursor-pointer font-bold">&times;</span>
        <div class="md:w-1/2 bg-gray-100 flex items-center justify-center">
            <img id="mImg" src="" class="max-h-[400px] object-contain">
        </div>
        <div class="md:w-1/2 p-8">
            <h2 id="mTitle" class="text-2xl font-bold text-gray-800 mb-2"></h2>
            <p id="mPrice" class="text-3xl font-bold text-red-700 mb-4"></p>
            <hr class="mb-4">
            <p class="font-bold text-sm mb-1">About this item:</p>
            <p id="mDesc" class="text-gray-600 mb-6"></p>
            <a id="waLink" href="#" class="bg-orange-400 w-full block text-center py-3 rounded-lg font-bold text-lg hover:bg-orange-500 transition">Buy Now on WhatsApp</a>
        </div>
    </div>
</div>

<script>
    function openModal(title, price, img, desc) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mPrice').innerText = price;
        document.getElementById('mImg').src = img;
        document.getElementById('mDesc').innerText = desc;
        document.getElementById('waLink').href = "https://wa.me/917008807942?text=Bhai, mujhe ye chahiye: " + title;
        document.getElementById('pModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('pModal').style.display = 'none'; }
</script>

</body>
</html>
